services:
  # The chaos engine. Wired to the bundled mock upstream and armed
  # (DRY_RUN=false) so `docker compose up` gives you a real, end-to-end storm
  # target out of the box - while never touching anything outside this network.
  chaos:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HTTP_HOST: '0.0.0.0'
      HTTP_PORT: '8080'
      DRY_RUN: 'false'
      STORM_TARGET_BASE_URL: 'http://mock:8080/anything'
      DEFAULT_STORM_SIZE: '2000'
      CONCURRENCY: '200'
    depends_on:
      mock:
        condition: service_started

  # A stand-in for the 3rd-party providers / service-1 / service-2. Echoes back
  # any request under /anything/* with 200, so storms have something to hit.
  mock:
    image: mccutchen/go-httpbin:v2.15.0
    restart: unless-stopped
    ports:
      - "8081:8080"
